name: Human-like RustEdit Archiver

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download & Install Launcher
        run: |
          # 1. Скачиваем архив с лаунчером (эмулируем браузер)
          Invoke-WebRequest -Uri "https://www.rustedit.io/resources/rustedit-launcher.16/download" -OutFile "launcher_bundle.zip"
          Expand-Archive -Path "launcher_bundle.zip" -DestinationPath "setup_temp" -Force
          
          # 2. Тихая установка (Inno Setup стандартные флаги)
          $setupExe = Get-ChildItem -Path "setup_temp" -Filter "*Setup*.exe" | Select-Object -First 1
          Start-Process -FilePath $setupExe.FullName -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=`"$PWD\RustEdit_Installed`"" -Wait -NoNewWindow
          
          Write-Output "Installation completed in $PWD\RustEdit_Installed"

      - name: Launch & Download Game Files
        run: |
          # 3. Запуск лаунчера для загрузки игры
          # Предполагаем, что exe называется RustEdit Launcher.exe
          $launcherExe = "$PWD\RustEdit_Installed\RustEdit Launcher.exe"
          
          Write-Output "Starting Launcher to download game files..."
          Start-Process -FilePath "$launcherExe" -ArgumentList "--install" -NoNewWindow
          
          # Ждем появления файлов игры (например, RustEdit.exe) в папке установки
          $timeout = 1200 # 20 минут
          $stopwatch = [System.Diagnostics.Stopwatch]::StartNew()
          $found = $false
          
          while ($stopwatch.Elapsed.TotalSeconds -lt $timeout) {
            if (Test-Path "$PWD\RustEdit_Installed\RustEdit.exe") {
              $found = $true
              break
            }
            Start-Sleep -Seconds 10
          }
          
          # Убиваем лаунчер, чтобы он не держал файлы
          Stop-Process -Name "RustEdit Launcher*" -Force
          
          if (-not $found) { throw "Timeout: Game files not downloaded." }

      - name: Archive Results
        run: |
          # 4. Пакуем всё содержимое папки установки в ZIP
          Compress-Archive -Path "RustEdit_Installed\*" -DestinationPath "RustEdit_Full.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: RustEdit_Full.zip
          tag_name: "vLatest"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
