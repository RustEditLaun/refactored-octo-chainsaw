name: Automate RustEdit Archiving

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  archive-rustedit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Archive
        shell: bash
        run: |
          SECRET="17ad1bce388b0f0a7566b8a8597c53d6"
          
          # 1. Получаем ID последней версии
          LATEST_JSON=$(curl -s "https://api2.patchkit.net/1/apps/$SECRET/versions/latest")
          VERSION_ID=$(echo $LATEST_JSON | jq -r '.id')
          VERSION_LABEL=$(echo $LATEST_JSON | jq -r '.label')
          
          echo "Latest Version: $VERSION_LABEL (ID: $VERSION_ID)"
          
          # 2. Проверяем, нужно ли скачивать
          mkdir -p version_info
          if [ -f "version_info/last_version.txt" ]; then
            LOCAL_VERSION=$(cat version_info/last_version.txt)
            if [ "$LOCAL_VERSION" == "$VERSION_LABEL" ]; then
              echo "Already up to date."
              exit 0
            fi
          fi
          
          # 3. Получаем прямую ссылку на скачивание (CDN)
          URL_JSON=$(curl -s "https://api2.patchkit.net/1/apps/$SECRET/versions/$VERSION_ID/content_urls")
          # Берем первую доступную ссылку
          DOWNLOAD_URL=$(echo $URL_JSON | jq -r '.[0].url')
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o "RustEdit_v$VERSION_LABEL.zip"
          
          # 4. Сохраняем версию
          echo "$VERSION_LABEL" > version_info/last_version.txt
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION_LABEL }}
          files: RustEdit_v${{ env.VERSION_LABEL }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version_info/last_version.txt
          git commit -m "Update to ${{ env.VERSION_LABEL }}"
          git push
